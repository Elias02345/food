name: Bootstrap MacroKitchen

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct source
        run: |
          cat bootstrap/part-* > /tmp/macrokitchen.b64
          base64 -d /tmp/macrokitchen.b64 > /tmp/macrokitchen.tar.gz
          test "$(wc -c < /tmp/macrokitchen.b64)" -eq 107872
          gzip -t /tmp/macrokitchen.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/macrokitchen.tar.gz -C .
      - name: Commit project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: launch MacroKitchen"
          git push origin main
